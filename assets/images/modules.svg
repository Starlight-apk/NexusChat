<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="50%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#a2d2ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="960" y="70" font-size="36" font-weight="bold" fill="url(#primary)" text-anchor="middle" filter="url(#glow)">📊 NexusChat 核心模块</text>
  
  <!-- Module Grid -->
  <g transform="translate(120, 120)">
    <!-- Row 1 -->
    <g>
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#00d9ff" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#00d9ff">🎯</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#00d9ff" text-anchor="middle">core.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">异步服务器核心</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">连接管理 · 会话处理 · 消息路由</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 核心模块</text>
    </g>
    
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#00ff88">📡</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#00ff88" text-anchor="middle">protocol.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">JSON 行协议处理</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">消息编码/解码 · 协议定义</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 协议层</text>
    </g>
    
    <g transform="translate(840, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#a2d2ff" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#a2d2ff">🔐</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#a2d2ff" text-anchor="middle">auth.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">认证与用户管理</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">注册/登录 · 密码哈希 · 会话</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 认证模块</text>
    </g>
    
    <g transform="translate(1260, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#e94560" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#e94560">🏠</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#e94560" text-anchor="middle">room.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">房间/群组管理</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">创建/加入/离开 · 成员管理</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 房间模块</text>
    </g>
  </g>
  
  <!-- Row 2 -->
  <g transform="translate(120, 360)">
    <g>
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#ffd700" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#ffd700">💾</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#ffd700" text-anchor="middle">storage.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">数据存储管理</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">JSON 文件 · SQLite · 消息历史</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 存储模块</text>
    </g>
    
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#ff6b9d" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#ff6b9d">📄</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#ff6b9d" text-anchor="middle">main.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">服务器入口</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">配置加载 · 信号处理 · 启动</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 入口文件</text>
    </g>
    
    <g transform="translate(840, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#9b5de5" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#9b5de5">💻</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#9b5de5" text-anchor="middle">client.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">测试客户端</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">命令行交互 · 功能测试</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 测试工具</text>
    </g>
    
    <g transform="translate(1260, 0)">
      <rect x="0" y="0" width="380" height="200" rx="16" fill="#1a1a2e" stroke="#00d9ff" stroke-width="2.5" filter="url(#glow)"/>
      <text x="190" y="50" font-size="42" text-anchor="middle" fill="#00d9ff">🧪</text>
      <text x="190" y="100" font-size="24" font-weight="bold" fill="#00d9ff" text-anchor="middle">test_server.py</text>
      <text x="190" y="135" font-size="16" fill="#a2d2ff" text-anchor="middle">自动化测试</text>
      <text x="190" y="165" font-size="14" fill="#8892b0" text-anchor="middle">功能测试 · 集成测试</text>
      <text x="190" y="190" font-size="14" fill="#00ff88" text-anchor="middle">✅ 测试套件</text>
    </g>
  </g>
  
  <!-- Config & Scripts -->
  <g transform="translate(120, 600)">
    <g>
      <rect x="0" y="0" width="560" height="160" rx="16" fill="#1a1a2e" stroke="#a2d2ff" stroke-width="2" opacity="0.8"/>
      <text x="280" y="45" font-size="22" font-weight="bold" fill="#a2d2ff" text-anchor="middle">⚙️ 配置文件</text>
      <text x="280" y="85" font-size="16" fill="#8892b0" text-anchor="middle">config/config.yaml - YAML 配置格式</text>
      <text x="280" y="115" font-size="14" fill="#667080" text-anchor="middle">服务器 · 认证 · 消息 · 房间 · 日志 · 存储</text>
      <text x="280" y="145" font-size="14" fill="#00ff88" text-anchor="middle">📝 灵活配置 · 易于定制</text>
    </g>
    
    <g transform="translate(600, 0)">
      <rect x="0" y="0" width="560" height="160" rx="16" fill="#1a1a2e" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
      <text x="280" y="45" font-size="22" font-weight="bold" fill="#00ff88" text-anchor="middle">🚀 部署脚本</text>
      <text x="280" y="85" font-size="16" fill="#8892b0" text-anchor="middle">scripts/deploy.sh - 一键部署</text>
      <text x="280" y="115" font-size="14" fill="#667080" text-anchor="middle">安装依赖 · 创建配置 · 启动服务 · systemd</text>
      <text x="280" y="145" font-size="14" fill="#00ff88" text-anchor="middle">📦 快速部署 · 生产就绪</text>
    </g>
    
    <g transform="translate(1200, 0)">
      <rect x="0" y="0" width="440" height="160" rx="16" fill="#1a1a2e" stroke="#ffd700" stroke-width="2" opacity="0.8"/>
      <text x="220" y="45" font-size="22" font-weight="bold" fill="#ffd700" text-anchor="middle">🐳 Docker 支持</text>
      <text x="220" y="85" font-size="16" fill="#8892b0" text-anchor="middle">Dockerfile · docker-compose.yml</text>
      <text x="220" y="115" font-size="14" fill="#667080" text-anchor="middle">容器化部署 · 一键启动</text>
      <text x="220" y="145" font-size="14" fill="#00ff88" text-anchor="middle">🔧 云原生支持</text>
    </g>
  </g>
  
  <!-- Protocol Flow -->
  <g transform="translate(120, 800)">
    <rect x="0" y="0" width="1680" height="220" rx="16" fill="#16213e" stroke="url(#primary)" stroke-width="2.5" filter="url(#glow)"/>
    <text x="840" y="45" font-size="26" font-weight="bold" fill="url(#primary)" text-anchor="middle">📡 协议示例 - JSON 行协议</text>
    
    <!-- Client to Server -->
    <text x="100" y="90" font-size="18" font-weight="bold" fill="#00d9ff">客户端 → 服务器</text>
    
    <rect x="50" y="110" width="750" height="95" rx="8" fill="#0a0a0f" opacity="0.8"/>
    <text x="70" y="140" font-family="monospace" font-size="13" fill="#00ff88">{"type": "register", "username": "alice", "password": "secret123"}</text>
    <text x="70" y="165" font-family="monospace" font-size="13" fill="#00d9ff">{"type": "auth", "username": "alice", "password": "secret123"}</text>
    <text x="70" y="190" font-family="monospace" font-size="13" fill="#a2d2ff">{"type": "message", "to": "bob", "content": "Hello!"}</text>
    
    <!-- Server to Client -->
    <text x="950" y="90" font-size="18" font-weight="bold" fill="#00ff88">服务器 → 客户端</text>
    
    <rect x="900" y="110" width="750" height="95" rx="8" fill="#0a0a0f" opacity="0.8"/>
    <text x="910" y="140" font-family="monospace" font-size="13" fill="#00ff88">{"type": "auth_success", "user": {...}, "session_id": "abc123"}</text>
    <text x="910" y="165" font-family="monospace" font-size="13" fill="#00d9ff">{"type": "message", "from": "alice", "content": "Hi!", "timestamp": 1234567890}</text>
    <text x="910" y="190" font-family="monospace" font-size="13" fill="#a2d2ff">{"type": "pong", "timestamp": 1234567890}</text>
  </g>
  
  <!-- Decorative -->
  <circle cx="1850" cy="100" r="60" fill="url(#primary)" opacity="0.1"/>
  <circle cx="70" cy="1000" r="50" fill="url(#primary)" opacity="0.1"/>
</svg>
