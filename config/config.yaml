# NexusChat 服务器配置文件

server:
  host: "0.0.0.0"
  port: 5222
  tls_port: 5223
  enable_tls: false
  tls_cert: ""
  tls_key: ""

# 认证配置
auth:
  allow_registration: true
  require_email: false
  password_min_length: 6
  session_timeout: 86400  # 24 小时

# 消息配置
message:
  max_size: 4096
  history_size: 100
  enable_offline: true

# 房间配置
room:
  max_members: 500
  max_rooms: 1000
  default_public: true

# 日志配置
logging:
  level: "INFO"
  file: "logs/nexuschat.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# 存储配置
storage:
  type: "json"  # json 或 sqlite
  data_dir: "data"
